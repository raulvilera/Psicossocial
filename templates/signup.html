<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Psico Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
        }

        .signup-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        select.form-control {
            appearance: none;
        }

        .btn-signup {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-signup:hover {
            background: var(--primary-hover);
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(150%);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000;
        }

        #toast.show {
            transform: translateX(0);
        }

        #toast i {
            color: #22c55e;
        }

        #toast.error i {
            color: #ef4444;
        }

        .hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="signup-card">
        <div class="logo">
            <i class="fas fa-user-plus"></i>
            <h1>Primeiro Acesso</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Cadastre-se para acessar o
                Sistema Psicossocial Pro</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>Nome Completo</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
                </div>
            </div>

            <div class="form-group">
                <label>E-mail Corporativo</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="seuemail@empresa.com.br" required>
                </div>
                <p class="hint">Use apenas o e-mail da sua empresa.</p>
            </div>

            <div class="form-group">
                <label>Empresa</label>
                <div class="input-wrapper">
                    <i class="fas fa-building"></i>
                    <select id="empresa_id" class="form-control" required>
                        <option value="">Selecione sua empresa</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Crie uma senha forte"
                        required>
                </div>
            </div>

            <button type="submit" class="btn-signup">Cadastrar e Solicitar Acesso</button>
        </form>

        <div class="footer">
            Já tem uma conta? <a href="/login">Entre aqui</a>
        </div>
    </div>

    <div id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Cadastro realizado com sucesso!</span>
    </div>

    <script>
        // Carregar empresas
        async function loadEmpresas() {
            const select = document.getElementById('empresa_id');
            try {
                const r = await fetch('/api/empresas');
                const empresas = await r.json();
                empresas.forEach(emp => {
                    const opt = document.createElement('option');
                    opt.value = emp.id;
                    opt.textContent = emp.nome;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error("Erro ao carregar empresas");
            }
        }
        loadEmpresas();

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = msg;
            toast.className = isError ? 'error show' : 'show';
            setTimeout(() => toast.classList.remove('show'), 5000);
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('nome', document.getElementById('nome').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('empresa_id', document.getElementById('empresa_id').value);

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                showToast(result.message, !result.success);

                if (result.success) {
                    setTimeout(() => window.location.href = '/login', 3000);
                }
            } catch (error) {
                showToast('Erro ao processar cadastro.', true);
            }
        });
    </script>
</body>

</html>
