<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa - Psico Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem;
            color: var(--text-main);
        }

        .container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-section h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .loading-cnpj {
            font-size: 0.75rem;
            color: var(--primary);
            display: none;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Psico Pro</h1>
            <p>Complete os dados da sua empresa para continuar</p>
        </div>

        <form id="empresaForm">
            <div class="form-section">
                <h2><i class="fas fa-building"></i> Dados da Empresa</h2>
                <div class="grid">
                    <div class="form-group">
                        <label>CNPJ</label>
                        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" required>
                        <div id="loadingCnpj" class="loading-cnpj">Buscando dados...</div>
                    </div>
                    <div class="form-group">
                        <label>Nome Fantasia</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="telefone" required>
                    </div>
                    <div class="form-group">
                        <label>Responsável</label>
                        <input type="text" id="responsavel" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2><i class="fas fa-users"></i> Infraestrutura</h2>
                <div class="grid">
                    <div class="form-group">
                        <label>Número de Colaboradores</label>
                        <input type="number" id="colaboradores" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Número de Setores</label>
                        <input type="number" id="num_setores" min="1" required>
                    </div>
                    <div class="form-group full">
                        <label>Quais são os setores? (Separados por vírgula)</label>
                        <textarea id="setores" rows="2" placeholder="Ex: RH, Financeiro, Operacional..."
                            required></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Finalizar Cadastro</button>
        </form>
    </div>

    <script>
        // Busca automática de CNPJ
        document.getElementById('cnpj').addEventListener('blur', async (e) => {
            const cnpj = e.target.value.replace(/\D/g, '');
            if (cnpj.length === 14) {
                const loading = document.getElementById('loadingCnpj');
                loading.style.display = 'block';
                try {
                    // Usando API via proxy (idealmente no backend, mas aqui exemplificamos via JSONP ou CORS se disponível)
                    // Por limitações de CORS em APIs gratuitas, simulamos a busca para o protótipo
                    const response = await fetch(`https://publica.cnpj.ws/cnpj/${cnpj}`);
                    const data = await response.json();

                    if (data.estabelecimento && data.estabelecimento.nome_fantasia) {
                        document.getElementById('nome').value = data.estabelecimento.nome_fantasia || data.razao_social;
                        document.getElementById('telefone').value = data.estabelecimento.telefone1 || '';
                    }
                } catch (err) {
                    console.log("Erro na busca de CNPJ remoto, simulando...");
                    // Simulação para o protótipo funcional
                    document.getElementById('nome').value = "Empresa Demonstrativa S.A.";
                } finally {
                    loading.style.display = 'none';
                }
            }
        });

        document.getElementById('empresaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('cnpj', document.getElementById('cnpj').value);
            formData.append('nome', document.getElementById('nome').value);
            formData.append('telefone', document.getElementById('telefone').value);
            formData.append('responsavel', document.getElementById('responsavel').value);
            formData.append('colaboradores', document.getElementById('colaboradores').value);
            formData.append('setores', document.getElementById('setores').value);

            try {
                const r = await fetch('/api/empresa/registrar', { method: 'POST', body: formData });
                const res = await r.json();
                if (res.success) {
                    alert('Cadastro da empresa concluído!');
                    window.location.href = '/';
                }
            } catch (err) {
                alert('Erro ao salvar dados.');
            }
        });
    </script>
</body>

</html>
